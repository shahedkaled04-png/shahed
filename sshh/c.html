<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Me - SHAHED KHALED</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ffe6f0, #f9f0ff);
            color: #4a4a4a;
        }
        nav {
            background: #d291bc;
            padding: 15px;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        nav ul li {
            margin: 0 20px;
        }
        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        nav ul li a:hover {
            color: #ffe6f0;
        }
        h2 {
            text-align: center;
            margin-top: 30px;
            color: #b56576;
        }
        form {
            max-width: 500px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            border: 2px solid #f7c5cc;
        }
        label {
            font-weight: bold;
            color: #b56576;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 18px;
            border: 1px solid #f7c5cc;
            border-radius: 8px;
            font-size: 14px;
            background: #fffafc;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #d291bc;
            box-shadow: 0 0 5px #d291bc;
        }
        input[type="submit"] {
            background: linear-gradient(to right, #f7c5cc, #d291bc);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            transition: 0.3s;
        }
        input[type="submit"]:hover {
            background: linear-gradient(to right, #d291bc, #f7c5cc);
        }
    </style>
    <script>
        function validateForm() {
            var name = document.forms["contactForm"]["fullname"].value;
            var email = document.forms["contactForm"]["email"].value;
            var country = document.forms["contactForm"]["country"].value;
            var comments = document.forms["contactForm"]["comments"].value;

            if (name == "" || email == "" || country == "" || comments == "") {
                alert("💖 Please fill in all fields!");
                return false;
            } else {
                alert("🌸 Thank you! Your form was submitted successfully!");
                return true;
            }
        }
    </script>
</head>
<body>
   
    <nav>
        <ul>
            <li><a href="inn.html">🏠 Home</a></li>
            <li><a href="c.html">💌 Contact Me</a></li>
        </ul>
    </nav>

   
    <h2>Get in Touch 🌷</h2>
    <form name="contactForm" onsubmit="return validateForm()">
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname"><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email"><br>

        <label for="country">Country:</label><br>
        <input type="text" id="country" name="country"><br>

        <label for="comments">Comments:</label><br>
        <textarea id="comments" name="comments" rows="5"></textarea><br>

        <input type="submit" value="Send Message 💖">
    </form>
</body>
</html>
